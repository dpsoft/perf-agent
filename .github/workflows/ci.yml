name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          libelf-dev \
          linux-headers-$(uname -r) \
          build-essential \
          pkg-config \
          libbpf-dev
        
        # Ensure bpf headers are available
        if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
          echo "Installing libbpf from source..."
          git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
          cd /tmp/libbpf/src
          sudo make install install_headers
          sudo ldconfig
        fi
    
    - name: Clone and build blazesym
      run: |
        git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
        cd /tmp/blazesym
        echo "Building blazesym C bindings package..."
        cargo build --release --package blazesym-c
        echo "Built files:"
        ls -lh target/release/libblazesym* || echo "No libblazesym files"
        ls -lh target/release/*.a || echo "No .a files"
        ls -lh target/release/*.so || echo "No .so files"
        echo ""
        echo "Verifying library exists:"
        if [ -f target/release/libblazesym_c.a ]; then
          echo "✓ libblazesym_c.a found"
          file target/release/libblazesym_c.a
        elif [ -f target/release/libblazesym.a ]; then
          echo "Found libblazesym.a, creating symlink..."
          ln -s libblazesym.a target/release/libblazesym_c.a
        else
          echo "ERROR: No blazesym library found!"
          exit 1
        fi

    - name: Run go generate
      run: go generate ./...

    - name: Build perf-agent
      env:
        CGO_CFLAGS: "-I/tmp/blazesym/capi/include"
        CGO_LDFLAGS: "-L/tmp/blazesym/target/release"
      run: go build -v .
    
    - name: Run unit tests
      run: go test -v ./cpu/... ./profile/... ./offcpu/...
    
    - name: Build test workloads
      run: |
        cd test/workloads/go
        go build -o cpu_bound cpu_bound.go
        go build -o io_bound io_bound.go
        cd ../rust
        cargo build --release
        cd ../python
        chmod +x *.py
    
    - name: Check Python perf support
      run: |
        python3 --version
        python3 -X perf -c "print('Python perf support available')" || echo "Python perf not available"

  # Integration tests require root and are harder to run in CI
  # They can be run manually or in a different environment
  integration-tests:
    runs-on: ubuntu-latest
    if: false  # Disabled by default, enable when you have a way to run with root
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Run integration tests
      run: |
        cd test
        sudo -E go test -v -timeout 5m ./...
