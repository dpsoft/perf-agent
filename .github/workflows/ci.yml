name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          libelf-dev \
          linux-headers-$(uname -r) \
          build-essential \
          pkg-config
    
    - name: Clone and build blazesym
      run: |
        git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
        cd /tmp/blazesym
        echo "Building blazesym with C header support..."
        cargo build --release --features=cheader
        echo "Built files:"
        ls -lh target/release/libblazesym* || true
        ls -lh target/release/*.a || true
        echo "Checking if libblazesym_c.a exists..."
        if [ ! -f target/release/libblazesym_c.a ]; then
          echo "libblazesym_c.a not found, checking for alternatives..."
          # Create symlink if needed
          if [ -f target/release/libblazesym.a ]; then
            echo "Found libblazesym.a, creating symlink..."
            ln -s libblazesym.a target/release/libblazesym_c.a
          fi
        fi
        echo "Final library files:"
        ls -lh target/release/libblazesym*.a
    
    - name: Update blazesym path for CI
      run: |
        echo "Original blazesym.go CGO flags:"
        grep "cgo LDFLAGS" blazesym/blazesym.go
        # Update to use /tmp/blazesym path
        sed -i 's|/home/diego/github/blazesym|/tmp/blazesym|g' blazesym/blazesym.go
        echo "Updated blazesym.go CGO flags:"
        grep "cgo LDFLAGS" blazesym/blazesym.go
    
    - name: Run go generate
      run: go generate ./...
    
    - name: Build perf-agent
      run: go build -v .
    
    - name: Run unit tests
      run: go test -v ./cpu/... ./profile/... ./offcpu/...
    
    - name: Build test workloads
      run: |
        cd test/workloads/go
        go build -o cpu_bound cpu_bound.go
        go build -o io_bound io_bound.go
        cd ../rust
        cargo build --release
        cd ../python
        chmod +x *.py
    
    - name: Check Python perf support
      run: |
        python3 --version
        python3 -X perf -c "print('Python perf support available')" || echo "Python perf not available"

  # Integration tests require root and are harder to run in CI
  # They can be run manually or in a different environment
  integration-tests:
    runs-on: ubuntu-latest
    if: false  # Disabled by default, enable when you have a way to run with root
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    
    - name: Run integration tests
      run: |
        cd test
        sudo -E go test -v -timeout 5m ./...
