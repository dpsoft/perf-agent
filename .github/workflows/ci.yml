name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    
    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang \
          llvm \
          libelf-dev \
          linux-headers-$(uname -r) \
          build-essential \
          pkg-config \
          libbpf-dev
        
        # Ensure bpf headers are available
        if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
          echo "Installing libbpf from source..."
          git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
          cd /tmp/libbpf/src
          sudo make install install_headers
          sudo ldconfig
        fi
    
    - name: Build and install blazesym
      run: |
        git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
        cd /tmp/blazesym
        echo "Building blazesym C bindings package..."
        cargo build --release --package blazesym-c
        echo "Built files:"
        ls -lh target/release/libblazesym* || echo "No libblazesym files"
        echo ""
        echo "Installing to /usr/local..."
        sudo mkdir -p /usr/local/include /usr/local/lib
        sudo cp capi/include/blazesym.h /usr/local/include/
        sudo cp target/release/libblazesym_c.a /usr/local/lib/
        sudo ldconfig
        echo "✓ blazesym installed"
    
    - name: Run go generate
      run: go generate ./...
    
    - name: Build perf-agent
      run: go build -v .
    
    - name: Run unit tests
      run: go test -v ./cpu/... ./profile/... ./offcpu/...
    
    - name: Build test workloads
      run: |
        cd test/workloads/go
        go build -o cpu_bound cpu_bound.go
        go build -o io_bound io_bound.go
        cd ../rust
        cargo build --release
        cd ../python
        chmod +x *.py
    
    - name: Check Python perf support
      run: |
        python3 --version
        python3 -X perf -c "print('Python perf support available')" || echo "Python perf not available"

  # Integration tests require root and are harder to run in CI
  # They can be run manually or in a different environment
  integration-tests:
    name: Integration Tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: false  # Disabled by default, enable when you have a way to run with root
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    
    - name: Run integration tests
      run: |
        cd test
        sudo -E go test -v -timeout 5m ./...
