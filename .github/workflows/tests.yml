name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build and install blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c
          # Install headers and library for official Go bindings
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp capi/include/blazesym.h /usr/local/include/
          sudo cp target/release/libblazesym_c.a /usr/local/lib/
          sudo ldconfig

      - name: Generate eBPF code
        run: go generate ./...

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./cpu/... ./profile/... ./offcpu/...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.txt
          flags: unittests

  integration-tests:
    name: Integration Tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build and install blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp capi/include/blazesym.h /usr/local/include/
          sudo cp target/release/libblazesym_c.a /usr/local/lib/
          sudo ldconfig

      - name: Build test workloads
        run: make test-workloads

      - name: Generate and build perf-agent
        run: |
          go generate ./...
          go build -o perf-agent

      - name: Run integration tests
        run: |
          cd test
          sudo -E $(which go) test -v -timeout 15m ./...

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build and install blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c
          # Install headers and library for official Go bindings
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp capi/include/blazesym.h /usr/local/include/
          sudo cp target/release/libblazesym_c.a /usr/local/lib/
          sudo ldconfig

      - name: Generate eBPF code
        run: go generate ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0
          args: --timeout=5m

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            goarch: amd64
          - arch: arm64
            runner: ubuntu-22.04-arm
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build and install blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c
          # Install headers and library for official Go bindings
          sudo mkdir -p /usr/local/include /usr/local/lib
          sudo cp capi/include/blazesym.h /usr/local/include/
          sudo cp target/release/libblazesym_c.a /usr/local/lib/
          sudo ldconfig

      - name: Generate eBPF code
        run: go generate ./...

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -v -o perf-agent-linux-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-agent-linux-${{ matrix.goarch }}
          path: perf-agent-linux-${{ matrix.goarch }}
