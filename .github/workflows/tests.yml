name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c

      - name: Generate eBPF code
        run: go generate ./...

      - name: Run unit tests
        env:
          CGO_CFLAGS: "-I/tmp/blazesym/capi/include"
          CGO_LDFLAGS: "-L/tmp/blazesym/target/release"
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./cpu/... ./profile/... ./offcpu/...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.txt
          flags: unittests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c

      - name: Build test workloads
        run: make test-workloads

      - name: Generate and build perf-agent
        env:
          CGO_CFLAGS: "-I/tmp/blazesym/capi/include"
          CGO_LDFLAGS: "-L/tmp/blazesym/target/release"
        run: |
          go generate ./...
          go build -o perf-agent

      - name: Run integration tests
        env:
          CGO_CFLAGS: "-I/tmp/blazesym/capi/include"
          CGO_LDFLAGS: "-L/tmp/blazesym/target/release"
        run: |
          cd test
          sudo -E $(which go) test -v -timeout 15m ./...

  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c

      - name: Generate eBPF code
        env:
          CGO_CFLAGS: "-I/tmp/blazesym/capi/include"
          CGO_LDFLAGS: "-L/tmp/blazesym/target/release"
        run: go generate ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-22.04
    # Note: ARM64 builds excluded because blazesym requires CGO,
    # and cross-compiling CGO code is complex. Native ARM64 builds
    # require ARM64 runners which may not be available.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            linux-headers-$(uname -r) \
            libbpf-dev
          
          # Ensure bpf headers are available
          if [ ! -f /usr/include/bpf/bpf_helpers.h ]; then
            echo "Installing libbpf from source..."
            git clone https://github.com/libbpf/libbpf.git /tmp/libbpf
            cd /tmp/libbpf/src
            sudo make install install_headers
            sudo ldconfig
          fi

      - name: Build blazesym
        run: |
          git clone https://github.com/libbpf/blazesym.git /tmp/blazesym
          cd /tmp/blazesym
          cargo build --release --package blazesym-c

      - name: Generate eBPF code
        run: go generate ./...

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_CFLAGS: "-I/tmp/blazesym/capi/include"
          CGO_LDFLAGS: "-L/tmp/blazesym/target/release"
        run: go build -v -o perf-agent-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-agent-linux-amd64
          path: perf-agent-linux-amd64
